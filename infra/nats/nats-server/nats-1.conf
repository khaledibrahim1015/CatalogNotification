# nats-1.conf
# ============================================================================
# NATS server config — used identically by nats-1, nats-2, nats-3
# Node identity comes from env vars injected by docker-compose ($NODE_NAME, $NODE_HOST)
# ============================================================================

server_name: $NODE_NAME
host: 0.0.0.0 
port: 4222
 # or 
 # listen: 0.0.0.0:4222 

# ----------------------------------------------------------------------------
# System account — credentials pulled from env vars set in docker-compose
# ----------------------------------------------------------------------------
accounts {
  SYS: {
    users: [ { user: $NATS_SYS_USER, password: $NATS_SYS_PASSWORD } ]
  }
  APP: {
    jetstream: enabled
    users: [ { user: $NATS_APP_USER, password: $NATS_APP_PASSWORD } ]
  }
}
system_account: SYS


# MQTT Support (built-in broker)
# ----------------------------------------------------------------------------
# MQTT — native broker, no separate EMQX cluster needed
# MQTT Support (built-in broker)
# ----------------------------------------------------------------------------

mqtt {
 listen: 0.0.0.0:1883
    # TLS termination for 8883 is handled by reverse proxy / load balancer in prod;
  # for local dev we expose plain 1883 and map 8883 -> 1883 at the compose level.

  # or 
  # port: 1883
  # tls {
  #   cert_file: "/etc/nats/certs/server.crt"
  #   key_file: "/etc/nats/certs/server.key"
  #   ca_file: "/etc/nats/certs/ca.crt"
  # }
  # ack_timeout: "5s"
  # max_ack_pending: 65536
}

websocket {
  listen: 0.0.0.0:8080
  no_tls: true
  # Map 8083 (WS) / 8084 (WSS) at the compose/proxy level in real deployments.
}


# ----------------------------------------------------------------------------
# JetStream — persistent, file-backed storage
# ----------------------------------------------------------------------------
jetstream {
  store_dir: /data/jetstream
  domain: catalog-cluster
  max_memory_store: 1GB
  max_file_store: 2GB
}

# ----------------------------------------------------------------------------
# Cluster — Raft quorum across 3 nodes.  | Cluster Formation (3-node Raft)
# ----------------------------------------------------------------------------
cluster {
  name: catalog-cluster
  listen: 0.0.0.0:6222
  routes: [
    nats-route://nats-2:6222
    nats-route://nats-3:6222
  ]
}


# ----------------------------------------------------------------------------
# Monitoring
# ----------------------------------------------------------------------------
http: 0.0.0.0:8222


# Logging
debug: false
trace: false
logtime: true



# ----------------------------------------------------------------------------
# Linux Performance tuning 
# ----------------------------------------------------------------------------

# ulimits for 60k+ concurrent connections — set nofile=131072 at the
# container/host level (see docker-compose.yml), not here.
max_connections: 65536
write_deadline: "10s"